  <style>
    html {
      scroll-behavior: smooth;
    }

    /* ANIMATIONS */
    .fade-up {
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s ease;
    }

    .fade-up.show {
      opacity: 1;
      transform: translateY(0);
    }

    .glow:hover {
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }

    /* BACKGROUND HIDUP (LEBIH HALUS + AMAN HP) */
    body::before,
    body::after {
      content: '';
      position: fixed;
      width: 400px;
      height: 400px;
      filter: blur(120px);
      z-index: -1;
      opacity: 0.6;
    }

    body::before {
      background: radial-gradient(circle, rgba(34, 211, 238, 0.4), transparent);
      top: -100px;
      left: -100px;
    }

    body::after {
      background: radial-gradient(circle, rgba(168, 85, 247, 0.4), transparent);
      bottom: -100px;
      right: -100px;
    }

    /* NOMINAL BUTTON */
    .nom-btn {
      padding: 10px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.2s ease;
    }

    /* HOVER */
    .nom-btn:hover {
      background: #22d3ee;
      color: black;
      transform: translateY(-2px);
    }

    /* ACTIVE CLICK */
    .nom-btn:active {
      transform: scale(0.95);
    }

    /* SELECTED */
    .nom-btn.active {
      background: #22d3ee;
      color: black;
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.6);
    }

    /* BUTTON DISABLED */
    .disabled-btn {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
      /* INI PENTING BIAR GA BISA DIKLIK */
    }
  </style>
</head>

      <!-- NOMINAL -->
      <div class="space-y-3">

        <input id="nominal" type="number" placeholder="Masukkan nominal"

        <div class="grid grid-cols-3 gap-3">

          <input type="checkbox" onchange="anon(this)"> Anonim

      <div class="space-y-2 text-sm text-gray-400">
        <label class="flex gap-2">
          <input type="checkbox" id="check1" onchange="validateForm()">
          Dengan ini saya menyatakan transaksi ini: murni dukungan saya untuk Davin, tidak dapat dikembalikan, bukan
          untuk transaksi komersial, bukan untuk aktivitas ilegal apa pun, tidak melanggar ketentuan
        </label>

        <label class="flex gap-2">
          <input type="checkbox" id="check2" onchange="validateForm()">
          Saya sudah berusia 18+
        </label>
      </div>

      <button id="donasiBtn" onclick="submitDonasi()"
        class="w-full bg-cyan-400 text-black p-3 rounded-lg font-bold transition disabled-btn">

<div id="qrisModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">

  <div class="bg-white text-black rounded-2xl p-6 w-[90%] max-w-sm text-center space-y-4">

    <h2 class="text-lg font-bold">Scan untuk bayar</h2>

    <!-- GANTI INI DENGAN QR LU -->
    <img src="Qr-dana.jpeg" class="mx-auto w-48">

    <p class="text-sm text-gray-500">Scan pakai Dana / OVO / QRIS</p>

    <button onclick="closeQR()" class="text-red-500 text-sm">
      Tutup
    </button>

  </div>

</div>

  <script>
    const menuBtn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");
    const closeBtn = document.getElementById("closeBtn");

    menuBtn.onclick = () => sidebar.style.left = "0";
    closeBtn.onclick = () => sidebar.style.left = "-100%";

    /* ANIMASI SCROLL */
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('show');
        }
      })
    });

    document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));



    const pesan = document.getElementById('pesan');
    pesan.addEventListener('input', () => {
      document.getElementById('count').innerText = pesan.value.length + ' / 250';
    });

    function anon(cb) {
      const nama = document.getElementById('nama');
      if (cb.checked) {
        nama.value = 'Anonim';
      } else {
        nama.value = 'Someone';
      }
    }

    let selectedNominal = null;

    function setNominal(val) {
      const buttons = document.querySelectorAll('.nom-btn');
      buttons.forEach(btn => btn.classList.remove('active'));


      document.getElementById('nominal').value = val;
      selectedNominal = val;

      validateForm();
    }

    function validateForm() {
      const nominal = document.getElementById('nominal').value;
      const c1 = document.getElementById('check1').checked;
      const c2 = document.getElementById('check2').checked;
      const btn = document.getElementById('donasiBtn');

      if (nominal && c1 && c2) {
        btn.classList.remove('disabled-btn');
      } else {
        btn.classList.add('disabled-btn');
      }
    }

    document.getElementById('nominal').addEventListener('input', validateForm);

   function submitDonasi(){
  const nominal = document.getElementById('nominal').value;
  const c1 = document.getElementById('check1').checked;
  const c2 = document.getElementById('check2').checked;

  if(!nominal){
    alert('Isi nominal dulu');
    return;
  }

  if(!c1 || !c2){
    alert('Centang semua persetujuan dulu');
    return;
  }

  // TAMPILKAN QR
  const modal = document.getElementById('qrisModal');
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}

function closeQR(){
  const modal = document.getElementById('qrisModal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
}
  </script>
